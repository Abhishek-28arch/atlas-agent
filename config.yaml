jarvis:
  name: JARVIS
  version: 0.1.0
  wake_word: hey jarvis
  user_name: TonyStark
  timezone: Asia/Kolkata
  work_style: professional
  primary_use: general
  system_prompt: "You are JARVIS, a personal AI assistant for TonyStark. You run locally\
    \ on their machine \u2014 no cloud, 100% private. Be professional, precise, and\
    \ well-structured in responses. You are a versatile assistant capable of helping\
    \ with any task. You have access to their files, can search the web, manage tasks,\
    \ and automate workflows. Always be helpful and proactive."
  onboarded: true
models:
  primary: qwen3.5:2b
  embedding: nomic-embed-text
  vision: llava:7b
  speech: whisper
  ollama_host: http://localhost:11434
memory:
  rag_db_path: ./data/rag_db
  history_db: ./data/history.db
  knowledge_dir: ./data/knowledge
  chunk_size: 500
  chunk_overlap: 50
  retrieval_top_k: 3
safety:
  require_approval_for:
  - file_delete
  - send_message
  - run_script
  blacklisted_paths:
  - ~/.ssh
  - ~/passwords
  - /etc
  max_actions_per_minute: 10
  log_file: ./data/logs/actions.log
  dry_run: false
gateway:
  host: 127.0.0.1
  port: 8000
  auth_token: ''
scheduler:
  morning_briefing_hour: 8
  evening_summary_hour: 21
  health_check_interval_hours: 6
telegram:
  token: ''
  allowed_user_id: 0
